<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoring · Feña Herrera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --green-50:#EEF4F0;
  --green-100:#D4E6D9;
  --green-200:#A8CCAF;
  --green-500:#3A6B4A;
  --green-700:#245235;
  --ink:#1A1A1A;
  --ink-2:#4A4A4A;
  --ink-3:#888;
  --rule:#DDE5DF;
  --surface:#F5F7F5;
  --page:#FFFFFF;
  --red-bg:#FDF0EE;
  --red:#B84040;
  --amber-bg:#FDF8EE;
  --amber:#906A1A;
  --r:8px;
  --shadow:0 1px 4px rgba(0,0,0,0.07);
}

body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);font-size:14px;line-height:1.6}

/* ── LAYOUT ── */
.wrap{max-width:960px;margin:0 auto;padding:36px 28px 80px}

/* ── HEADER ── */
.site-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:36px;padding-bottom:24px;border-bottom:1.5px solid var(--green-500)}
.site-header h1{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;line-height:1.15;letter-spacing:-0.4px;color:var(--ink)}
.site-header h1 em{font-style:italic;color:var(--green-500)}
.header-meta{text-align:right;flex-shrink:0}
.names-display{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.name-chip{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;color:var(--ink-2)}
.name-chip .role{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--green-500);background:var(--green-50);padding:2px 7px;border-radius:20px}
.header-pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;margin-top:10px}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--rule);color:var(--ink-3)}

/* ── SECTION TITLE ── */
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-head h2{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-3);white-space:nowrap}
.sec-head hr{flex:1;border:none;border-top:1px solid var(--rule)}
.sec-head .sec-action{flex-shrink:0}

/* ── DASHBOARD CARDS ── */
.dashboard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:36px}
.obj-card{background:var(--page);border:1px solid var(--rule);border-radius:var(--r);padding:16px;cursor:pointer;transition:box-shadow 0.15s,border-color 0.15s;border-top:3px solid var(--c)}
.obj-card:hover{box-shadow:var(--shadow);border-color:var(--c)}
.obj-card.active{box-shadow:0 0 0 2px var(--c);border-color:var(--c)}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.oc-name{font-size:13px;font-weight:500;line-height:1.35}
.oc-pct{font-size:20px;font-weight:600;color:var(--c);flex-shrink:0}
.oc-bar{height:5px;background:var(--green-50);border-radius:3px;overflow:hidden;margin-bottom:8px}
.oc-fill{height:100%;border-radius:3px;background:var(--c);transition:width 0.7s ease}
.oc-stats{display:flex;gap:10px}
.oc-stat{font-size:11px;color:var(--ink-3)}
.oc-stat b{color:var(--ink);font-weight:500}

/* pending tasks summary */
.pending-banner{background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r);padding:12px 16px;margin-bottom:36px;display:flex;align-items:center;gap:12px}
.pending-banner .pb-label{font-size:12px;color:var(--green-700);font-weight:500}
.pending-banner .pb-count{background:var(--green-500);color:#fff;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.pending-banner .pb-items{font-size:12px;color:var(--ink-2);flex:1}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:20px;background:var(--green-50);border-radius:var(--r);padding:3px}
.tab-btn{flex:1;padding:8px 12px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--ink-3);border-radius:6px;cursor:pointer;transition:all 0.15s}
.tab-btn.active{background:var(--page);color:var(--ink);box-shadow:var(--shadow)}

.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── SESSIONS ── */
.session-list{display:flex;flex-direction:column;gap:8px}
.session-row{background:var(--page);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.session-row.draft-row{border-style:dashed;border-color:var(--green-200)}
.session-head{display:grid;grid-template-columns:56px 1fr auto;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.session-head:hover{background:var(--surface)}
.s-badge{font-size:10px;font-weight:700;letter-spacing:0.06em;color:#fff;background:var(--green-500);border-radius:5px;padding:4px 8px;text-align:center}
.s-badge.draft{background:var(--ink-3)}
.s-title{font-size:13px;font-weight:500}
.s-date{font-size:11px;color:var(--ink-3);margin-top:1px}
.s-chevron{font-size:18px;color:var(--ink-3);transition:transform 0.2s}
.session-row.open .s-chevron{transform:rotate(180deg)}
.session-body{display:none;padding:0 16px 16px 16px;border-top:1px solid var(--rule)}
.session-row.open .session-body{display:block}

.sb-section{margin-top:16px}
.sb-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.sb-notes{width:100%;background:var(--surface);border:1px solid var(--rule);border-radius:6px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);resize:vertical;outline:none;line-height:1.6;min-height:80px}
.sb-notes:focus{border-color:var(--green-500)}
.sb-list{display:flex;flex-direction:column;gap:6px}
.sb-item{font-size:13px;color:var(--ink-2);line-height:1.65;padding-left:0}
.sb-item::before{content:'';display:none}
.sb-item.sb-heading{font-size:12px;font-weight:600;color:var(--green-700);margin-top:10px;padding-top:10px;border-top:1px solid var(--rule)}
.sb-item.sb-heading::before{content:'';display:none}
.sb-item.sb-heading:first-child{margin-top:0;padding-top:0;border-top:none}

/* ── TASKS ── */
.task-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--rule);background:var(--page);color:var(--ink-3);cursor:pointer;transition:all 0.15s}
.filter-btn.on{background:var(--green-500);color:#fff;border-color:var(--green-500)}

.task-table{width:100%;border-collapse:collapse;background:var(--page);border-radius:var(--r);overflow:hidden;border:1px solid var(--rule)}
.task-table th{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);padding:10px 12px;text-align:left;background:var(--surface);border-bottom:1px solid var(--rule)}
.task-table td{padding:10px 12px;border-bottom:1px solid var(--rule);vertical-align:middle;font-size:13px}
.task-table tr:last-child td{border-bottom:none}
.task-table tr.done-row td{opacity:0.5}
.task-table tr.done-row .task-desc{text-decoration:line-through}

.status-dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--rule);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all 0.15s}
.status-dot.pending{background:#fff;border-color:var(--ink-3)}
.status-dot.done{background:var(--green-500);border-color:var(--green-500);color:#fff}
.status-dot.missed{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.status-dot:hover{border-color:var(--green-500)}

.resp-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.resp-mentor{background:var(--green-50);color:var(--green-700)}
.resp-mentee{background:#EEF2FC;color:#2D4F9A}

.obj-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}

.due-date{font-size:11px;color:var(--ink-3)}
.due-date.overdue{color:var(--red);font-weight:500}

/* ── ADD TASK FORM ── */
.add-task-form{background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r);padding:16px;margin-top:12px;display:none}
.add-task-form.visible{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-grid.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--ink-3)}
.fg input,.fg select,.fg textarea{background:var(--page);border:1px solid var(--rule);border-radius:5px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);outline:none;transition:border-color 0.15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--green-500)}
.form-actions{display:flex;gap:8px;justify-content:flex-end}

/* ── BUTTONS ── */
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.btn-primary{background:var(--green-500);color:#fff;border-color:var(--green-500)}
.btn-primary:hover{background:var(--green-700)}
.btn-ghost{background:transparent;color:var(--ink-3);border-color:var(--rule)}
.btn-ghost:hover{background:var(--surface);color:var(--ink)}
.btn-sm{font-size:11px;padding:5px 12px}

/* ── OBJECTIVES DETAIL ── */
.obj-detail-grid{display:flex;flex-direction:column;gap:12px}
.obj-detail-card{background:var(--page);border:1px solid var(--rule);border-radius:var(--r);overflow:hidden}
.odc-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--rule);border-left:4px solid var(--c);cursor:pointer}
.odc-head:hover{background:var(--surface)}
.odc-title{font-size:14px;font-weight:500;flex:1}
.odc-pct{font-size:13px;font-weight:600;color:var(--c)}
.odc-body{display:none;padding:16px}
.obj-detail-card.open .odc-body{display:block}

.rubric-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.r-cell{border-radius:6px;padding:12px;border:1px solid var(--rule);background:var(--surface);font-size:12px;color:var(--ink-2);line-height:1.55}
.r-cell.r-now{background:#FFFDF5;border-color:#D4C87A}
.r-cell.r-goal{background:var(--green-50);border-color:var(--green-100)}
.r-label{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;color:var(--ink-3)}
.r-cell.r-now .r-label{color:#7A6A10}
.r-cell.r-goal .r-label{color:var(--green-500)}
.r-cell.r-goal p{font-weight:500;color:var(--ink)}

.slider-wrap{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--rule)}
.slider-wrap label{font-size:11px;color:var(--ink-3);white-space:nowrap}
.slider-wrap input[type=range]{flex:1;accent-color:var(--green-500);cursor:pointer}
.slider-wrap .sv{font-size:13px;font-weight:600;color:var(--green-500);min-width:40px;text-align:right}

.mentor-note{margin-top:12px}
.mentor-note textarea{width:100%;background:var(--surface);border:1px solid var(--rule);border-radius:6px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);resize:vertical;outline:none;line-height:1.6;min-height:70px}
.mentor-note textarea:focus{border-color:var(--green-500)}

/* ── RESOURCES ── */
.resource-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.resource-card{background:var(--page);border:1px solid var(--rule);border-radius:var(--r);padding:16px;position:relative}
.resource-card.pending-card{border-style:dashed;background:var(--surface)}
.rc-type{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green-500);margin-bottom:6px}
.rc-title{font-size:13px;font-weight:500;margin-bottom:4px}
.rc-desc{font-size:12px;color:var(--ink-2);line-height:1.55}
.rc-session{font-size:10px;color:var(--ink-3);margin-top:8px}

.add-resource-form{display:none;background:var(--green-50);border:1px solid var(--green-100);border-radius:var(--r);padding:16px;margin-top:12px}
.add-resource-form.visible{display:block}

/* ── CHART ── */
.chart-card{background:var(--page);border:1px solid var(--rule);border-radius:var(--r);padding:20px}
.chart-legend{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.chart-legend span{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2)}
.swatch{width:14px;height:3px;border-radius:2px;display:inline-block}
.chart-wrap{position:relative;height:200px}

/* ── EDIT NAME MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;display:none;align-items:center;justify-content:center}
.modal-overlay.visible{display:flex}
.modal{background:var(--page);border-radius:var(--r);padding:24px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}

@media(max-width:640px){
  .dashboard{grid-template-columns:1fr}
  .rubric-grid{grid-template-columns:1fr 1fr}
  .resource-grid{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
  .wrap{padding:20px 14px 60px}
}
</style>
</head>
<body>

<div class="wrap">

  <!-- HEADER -->
  <div class="site-header">
    <div>
      <h1>Programa de<br><em>Mentoring</em></h1>
    </div>
    <div class="header-meta">
      <div class="names-display">
        <div class="name-chip"><span class="role">Mentor</span> Edu Suarez</div>
        <div class="name-chip"><span class="role" style="background:#EEF2FC;color:#2D4F9A">Mentee</span> Feña Herrera</div>
      </div>
      <div class="header-pills">
        <span class="pill">Cada 2 semanas</span>
        <span class="pill">1 hora</span>
        <span class="pill">Slack AM</span>
      </div>
      <div style="margin-top:8px;text-align:right">
        <button class="btn btn-ghost btn-sm" onclick="openEditNames()">Editar nombres</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD CARDS -->
  <div class="sec-head"><h2>Objetivos</h2><hr></div>
  <div class="dashboard" id="dashCards"></div>

  <!-- PENDING TASKS BANNER -->
  <div class="pending-banner" id="pendingBanner">
    <span class="pb-label">Compromisos pendientes</span>
    <span class="pb-count" id="pendingCount">0</span>
    <span class="pb-items" id="pendingItems"></span>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sessions',this)">Sesiones</button>
    <button class="tab-btn" onclick="switchTab('tasks',this)">Tareas y acuerdos</button>
    <button class="tab-btn" onclick="switchTab('objectives',this)">Objetivos</button>
    <button class="tab-btn" onclick="switchTab('resources',this)">Recursos</button>
    <button class="tab-btn" onclick="switchTab('progress',this)">Progreso</button>
  </div>

  <!-- TAB: SESSIONS -->
  <div class="tab-panel active" id="tab-sessions">
    <div class="session-list" id="sessionList"></div>
    <button class="btn btn-ghost btn-sm" onclick="openAddSession()" style="margin-top:10px">+ Agregar sesión</button>
    <div class="add-task-form" id="addSessionForm">
      <div class="form-grid">
        <div class="fg"><label>Número</label><input type="text" id="sf-num" placeholder="S3"></div>
        <div class="fg"><label>Fecha</label><input type="date" id="sf-date"></div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Título</label><input type="text" id="sf-title" placeholder="Ej: Revisión de tarea y primeras conversaciones"></div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Puntos tratados (uno por línea)</label><textarea id="sf-points" rows="3"></textarea></div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Compromisos (uno por línea)</label><textarea id="sf-tasks" rows="2"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="closeAddSession()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitSession()">Guardar sesión</button>
      </div>
    </div>
  </div>

  <!-- TAB: TASKS -->
  <div class="tab-panel" id="tab-tasks">
    <div class="task-filters">
      <button class="filter-btn on" onclick="filterTasks('all',this)">Todas</button>
      <button class="filter-btn" onclick="filterTasks('pending',this)">Pendientes</button>
      <button class="filter-btn" onclick="filterTasks('done',this)">Cumplidas</button>
      <button class="filter-btn" onclick="filterTasks('missed',this)">No cumplidas</button>
    </div>
    <table class="task-table" id="taskTable">
      <thead>
        <tr>
          <th style="width:36px"></th>
          <th>Tarea / acuerdo</th>
          <th>Responsable</th>
          <th>Fecha límite</th>
          <th>Objetivo</th>
          <th>Sesión</th>
        </tr>
      </thead>
      <tbody id="taskBody"></tbody>
    </table>
    <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()" style="margin-top:10px">+ Agregar tarea</button>
    <div class="add-task-form" id="addTaskForm">
      <div class="form-grid full">
        <div class="fg"><label>Descripción</label><input type="text" id="tf-desc" placeholder="Descripción de la tarea o acuerdo"></div>
      </div>
      <div class="form-grid">
        <div class="fg">
          <label>Responsable</label>
          <select id="tf-resp">
            <option value="mentee">Feña (Mentee)</option>
            <option value="mentor">Edu (Mentor)</option>
            <option value="ambos">Ambos</option>
          </select>
        </div>
        <div class="fg"><label>Fecha límite</label><input type="date" id="tf-date"></div>
      </div>
      <div class="form-grid">
        <div class="fg">
          <label>Objetivo relacionado</label>
          <select id="tf-obj">
            <option value="0">Comunicación con pares</option>
            <option value="1">Potenciar perfiles senior</option>
            <option value="2">Visibilidad del área</option>
            <option value="-1">General</option>
          </select>
        </div>
        <div class="fg">
          <label>Sesión de origen</label>
          <select id="tf-session">
            <option value="S1">S1</option>
            <option value="S2" selected>S2</option>
            <option value="S3">S3</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="toggleAddTask()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitTask()">Agregar tarea</button>
      </div>
    </div>
  </div>

  <!-- TAB: OBJECTIVES -->
  <div class="tab-panel" id="tab-objectives">
    <div class="obj-detail-grid" id="objDetailList"></div>
  </div>

  <!-- TAB: RESOURCES -->
  <div class="tab-panel" id="tab-resources">
    <div class="resource-grid" id="resourceGrid"></div>
    <button class="btn btn-ghost btn-sm" onclick="toggleAddResource()" style="margin-top:12px">+ Agregar recurso</button>
    <div class="add-resource-form" id="addResourceForm">
      <div class="form-grid">
        <div class="fg">
          <label>Tipo</label>
          <select id="rf-type">
            <option>Libro</option>
            <option>Artículo</option>
            <option>Podcast</option>
            <option>Tarea</option>
            <option>Reflexión</option>
            <option>Otro</option>
          </select>
        </div>
        <div class="fg"><label>Sesión en que se recomendó</label>
          <select id="rf-session">
            <option>S1</option><option selected>S2</option><option>S3</option>
          </select>
        </div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Título</label><input type="text" id="rf-title" placeholder="Nombre del libro, artículo, etc."></div>
      </div>
      <div class="form-grid full">
        <div class="fg"><label>Descripción</label><textarea id="rf-desc" rows="2" placeholder="Por qué lo recomiendas y para qué sirve"></textarea></div>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="toggleAddResource()">Cancelar</button>
        <button class="btn btn-primary" onclick="submitResource()">Agregar</button>
      </div>
    </div>
  </div>

  <!-- TAB: PROGRESS -->
  <div class="tab-panel" id="tab-progress">
    <div class="chart-card">
      <div class="chart-legend" id="chartLegend"></div>
      <div class="chart-wrap">
        <canvas id="progressChart" role="img" aria-label="Progreso de los tres objetivos a lo largo de las sesiones de mentoring"></canvas>
      </div>
    </div>
  </div>

</div>

<!-- EDIT NAMES MODAL -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <h3>Editar nombres</h3>
    <div class="fg" style="margin-bottom:10px">
      <label>Mentor</label>

// ── TABS ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── DASHBOARD CARDS ──
function renderDashCards() {
  const el = document.getElementById('dashCards');
  el.innerHTML = '';
  state.objectives.forEach((obj, i) => {
    const pending = state.tasks.filter(t => t.objId === i && t.status === 'pending').length;
    const done = state.tasks.filter(t => t.objId === i && t.status === 'done').length;
    const card = document.createElement('div');
    card.className = 'obj-card';
    card.style.setProperty('--c', obj.color);
    card.onclick = () => { switchTab('objectives', document.querySelectorAll('.tab-btn')[2]); openObjDetail(i); };
    card.innerHTML = `
      <div class="oc-top"><span class="oc-name">${obj.name}</span><span class="oc-pct">${obj.progress}%</span></div>
      <div class="oc-bar"><div class="oc-fill" style="width:${obj.progress}%"></div></div>
      <div class="oc-stats">
        <span class="oc-stat"><b>${pending}</b> pendiente${pending!==1?'s':''}</span>
        <span class="oc-stat"><b>${done}</b> cumplida${done!==1?'s':''}</span>
      </div>`;
    el.appendChild(card);
  });
}

// ── PENDING BANNER ──
function renderPendingBanner() {

  document.getElementById('pendingItems').textContent = items + (pending.length > 2 ? ` · y ${pending.length-2} más` : '');
}

            </div>

              <label class="sb-label">${s.status==='draft'?'Temas propuestos':'Puntos tratados'} — uno por línea</label>

function toggleEditSession(idx) {
  const view = document.getElementById('sview-'+idx);
  const edit = document.getElementById('sedit-'+idx);
  const isEditing = edit.style.display !== 'none';
  view.style.display = isEditing ? 'block' : 'none';
  edit.style.display = isEditing ? 'none' : 'block';
  // make sure body is open
  const row = document.getElementById('srow-'+idx);
  if(!row.classList.contains('open')) row.classList.add('open');
}

function saveEditSession(idx) {
  const title = document.getElementById('sedit-title-'+idx).value.trim();
  const date = document.getElementById('sedit-date-'+idx).value.trim();
  const points = document.getElementById('sedit-points-'+idx).value.trim().split('\n').filter(l=>l.trim());
  if(!title) { alert('El título no puede estar vacío.'); return; }
  state.sessions[idx].title = title;
  state.sessions[idx].date = date || state.sessions[idx].date;
  state.sessions[idx].points = points.length ? points : state.sessions[idx].points;
  // preserve open state
  const wasOpen = document.getElementById('srow-'+idx).classList.contains('open');
  renderSessions();
  if(wasOpen) { const row = document.getElementById('srow-'+idx); if(row) row.classList.add('open'); }
}

function confirmSession(idx) {
  const s = state.sessions[idx];
  s.status = 'done';
  // snapshot current progress in chart
  const sIdx = idx;
  if(sIdx < 6) state.objectives.forEach((_,i) => { state.chartData[i][sIdx] = state.objectives[i].progress; });
  const wasOpen = document.getElementById('srow-'+idx).classList.contains('open');
  renderAll();
  if(wasOpen) { const row = document.getElementById('srow-'+idx); if(row) row.classList.add('open'); }
}

function saveSessionNote(idx, val) { state.sessions[idx].notes = val; }
function toggleSession(idx) {
  const row = document.getElementById('srow-'+idx);
  row.classList.toggle('open');
}
function openAddSession() {
  const f = document.getElementById('addSessionForm');
  f.classList.toggle('visible');
}
function closeAddSession() { document.getElementById('addSessionForm').classList.remove('visible'); }
function submitSession() {
  const num = document.getElementById('sf-num').value.trim() || 'S'+(state.sessions.length+1);
  const title = document.getElementById('sf-title').value.trim();
  const date = document.getElementById('sf-date').value;
  const points = document.getElementById('sf-points').value.trim().split('\n').filter(l=>l.trim());
  const tasks = document.getElementById('sf-tasks').value.trim().split('\n').filter(l=>l.trim());
  if(!title) { alert('Agrega un título.'); return; }
  state.sessions.push({num, title, date: date||num, status:'done', points: points.length?points:['Sin puntos registrados.'], notes:''});
  // add tasks from session
  tasks.forEach(t => {
    state.tasks.push({id:state.taskIdCounter++, desc:t, resp:'mentee', date:'', objId:-1, session:num, status:'pending'});
    // update session selects
    const sel = document.getElementById('tf-session');
    if(sel) { const o=document.createElement('option'); o.value=num; o.textContent=num; sel.appendChild(o); }
    const sel2 = document.getElementById('rf-session');
    if(sel2) { const o=document.createElement('option'); o.value=num; o.textContent=num; o.selected=true; sel2.appendChild(o); }
  });
  // update chart
  const sIdx = state.sessions.length - 1;
  if(sIdx < 6) state.objectives.forEach((_,i) => { state.chartData[i][sIdx] = state.objectives[i].progress; });
  renderAll(); closeAddSession();
  ['sf-num','sf-title','sf-date','sf-points','sf-tasks'].forEach(id => document.getElementById(id).value='');
}

// ── TASKS ──
function renderTasks() {
  const tbody = document.getElementById('taskBody');
  tbody.innerHTML = '';
  const filtered = state.currentFilter==='all' ? state.tasks : state.tasks.filter(t=>t.status===state.currentFilter);
  filtered.forEach(task => {
    const obj = task.objId >= 0 ? state.objectives[task.objId] : null;
    const dotColor = obj ? obj.color : '#bbb';
    const objLabel = obj ? OBJ_NAMES_SHORT[task.objId] : 'General';
    const respLabel = task.resp==='mentee' ? state.menteeName.split(' ')[0] : task.resp==='mentor' ? state.mentorName.split(' ')[0] : 'Ambos';
    const respCls = task.resp==='mentor'?'resp-mentor':'resp-mentee';
    const isOverdue = task.date && task.status==='pending' && new Date(task.date) < new Date();
    const dateLabel = task.date ? new Date(task.date).toLocaleDateString('es-CL',{day:'numeric',month:'short'}) : '—';
    const statusIcon = task.status==='done'?'✓':task.status==='missed'?'✗':'';
    const tr = document.createElement('tr');
    tr.className = task.status==='done'?'done-row':'';
    tr.innerHTML = `
      <td><div class="status-dot ${task.status}" onclick="cycleStatus(${task.id})" title="Cambiar estado">${statusIcon}</div></td>
      <td><span class="task-desc" contenteditable="true"
        style="outline:none;cursor:text;display:block;border-radius:3px;padding:2px 4px;transition:background 0.15s"
        onfocus="this.style.background='var(--green-50)'"
        onblur="this.style.background='';saveTaskDesc(${task.id},this.innerText.trim())"
      >${task.desc}</span></td>
      <td><span class="resp-badge ${respCls}">${respLabel}</span></td>
      <td><span class="due-date ${isOverdue?'overdue':''}">${dateLabel}</span></td>
      <td><span style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--ink-2)"><span class="obj-dot" style="background:${dotColor}"></span>${objLabel}</span></td>
      <td style="font-size:12px;color:var(--ink-3)">${task.session}</td>`;
    tbody.appendChild(tr);
  });
}
function cycleStatus(id) {
  const task = state.tasks.find(t=>t.id===id);
  if(!task) return;
  const cycle = {pending:'done',done:'missed',missed:'pending'};
  task.status = cycle[task.status];
  renderAll();
}
function saveTaskDesc(id, val) {
  const task = state.tasks.find(t=>t.id===id);
  if(task && val) task.desc = val;
}
function filterTasks(f, btn) {
  state.currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderTasks();
}
function toggleAddTask() {
  document.getElementById('addTaskForm').classList.toggle('visible');
}
function submitTask() {
  const desc = document.getElementById('tf-desc').value.trim();
  if(!desc) { alert('Agrega una descripción.'); return; }
  state.tasks.push({
    id: state.taskIdCounter++,
    desc,
    resp: document.getElementById('tf-resp').value,
    date: document.getElementById('tf-date').value,
    objId: parseInt(document.getElementById('tf-obj').value),
    session: document.getElementById('tf-session').value,
    status: 'pending'
  });
  document.getElementById('tf-desc').value='';
  document.getElementById('tf-date').value='';
  toggleAddTask();
  renderAll();
}

      { field:'goal',  cls:'r-goal', label:'Meta' }
    ];

    const rubricHtml = rubricFields.map(({field, cls, label}) => `
      <div class="r-cell ${cls}">
        <div class="r-label">${label}</div>
        <p contenteditable="true"
           style="outline:none;cursor:text;min-height:38px;border-radius:3px;padding:3px 4px;transition:background 0.15s;white-space:pre-wrap"
           onfocus="this.style.background='var(--green-50)'"
           onblur="this.style.background='';state.objectives[${i}]['${field}']=this.innerText.trim()"
        >${obj[field]}</p>
      </div>`).join('');

    card.innerHTML = `
      <div class="odc-head" onclick="toggleObjDetail(${i})">
        <span class="odc-title">${obj.name}</span>
        <span class="odc-pct">${obj.progress}%</span>
        <span class="s-chevron" id="odcchev-${i}">&#8964;</span>
      </div>
      <div class="odc-body">
        <div class="rubric-grid">${rubricHtml}</div>
        <div class="slider-wrap">
          <label>Ajustar progreso</label>
          <input type="range" min="0" max="100" step="5" value="${obj.progress}" oninput="updateObjProgress(${i},this.value)">
          <span class="sv" id="sv-${i}">${obj.progress}%</span>
        </div>
        <div class="mentor-note">
          <div class="sb-label" style="font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px">Notas del mentor</div>
          <textarea placeholder="Observaciones sobre el avance en este objetivo..." oninput="state.objectives[${i}].notes=this.value">${obj.notes}</textarea>
        </div>
      </div>`;
    el.appendChild(card);
  });
}
function toggleObjDetail(i) {
  const card = document.getElementById('odc-'+i);
  card.classList.toggle('open');
  document.getElementById('odcchev-'+i).style.transform = card.classList.contains('open')?'rotate(180deg)':'';
}
function openObjDetail(i) {
  const card = document.getElementById('odc-'+i);
  if(!card.classList.contains('open')) { card.classList.add('open'); document.getElementById('odcchev-'+i).style.transform='rotate(180deg)'; }
  card.scrollIntoView({behavior:'smooth',block:'start'});
}
function updateObjProgress(i, val) {
  val = parseInt(val);
  state.objectives[i].progress = val;
  document.getElementById('sv-'+i).textContent = val+'%';
  renderDashCards();
  updateChart();
}

// ── RESOURCES ──
function renderResources() {
  const grid = document.getElementById('resourceGrid');
  grid.innerHTML = '';
  state.resources.forEach((r, ri) => {
    const card = document.createElement('div');
    card.className = 'resource-card';
    card.innerHTML = `
      <div class="rc-type" contenteditable="true"
        style="outline:none;cursor:text;border-radius:2px;padding:1px 3px;transition:background 0.15s"
        onfocus="this.style.background='var(--green-50)'"
        onblur="this.style.background='';state.resources[${ri}].type=this.innerText.trim()"
      >${r.type}</div>
      <div class="rc-title" contenteditable="true"
        style="outline:none;cursor:text;border-radius:3px;padding:1px 3px;transition:background 0.15s"
        onfocus="this.style.background='var(--green-50)'"
        onblur="this.style.background='';state.resources[${ri}].title=this.innerText.trim()"
      >${r.title}</div>
      <div class="rc-desc" contenteditable="true"
        style="outline:none;cursor:text;border-radius:3px;padding:1px 3px;transition:background 0.15s;white-space:pre-wrap"
        onfocus="this.style.background='var(--green-50)'"
        onblur="this.style.background='';state.resources[${ri}].desc=this.innerText.trim()"
      >${r.desc}</div>
      <div class="rc-session">Recomendado en ${r.session}</div>`;
    grid.appendChild(card);
  });
  const add = document.createElement('div');
  add.className = 'resource-card pending-card';
  add.innerHTML = `<div class="rc-type">Pendiente</div><div class="rc-title">Próximo recurso</div><div class="rc-desc">Se definirá según los avances de la próxima sesión.</div>`;
  grid.appendChild(add);
}
function toggleAddResource() {
  document.getElementById('addResourceForm').classList.toggle('visible');
}
function submitResource() {
  const title = document.getElementById('rf-title').value.trim();
  if(!title) { alert('Agrega un título.'); return; }
  state.resources.push({
    type: document.getElementById('rf-type').value,
    title,
    desc: document.getElementById('rf-desc').value.trim(),
    session: document.getElementById('rf-session').value
  });
  document.getElementById('rf-title').value='';
  document.getElementById('rf-desc').value='';
  toggleAddResource();
  renderResources();
}
let chart = null;
function initChart() {
  const legend = document.getElementById('chartLegend');
  legend.innerHTML = state.objectives.map(o=>`<span><span class="swatch" style="background:${o.color}"></span>${o.name}</span>`).join('');
  const ctx = document.getElementById('progressChart');
  chart = new Chart(ctx, {
    type:'line',
    data:{
      labels:['S1','S2','S3','S4','S5','S6','S7','S8','S9','S10','S11','S12'],
      datasets: state.objectives.map((obj,i)=>({
        label: obj.name,
        data: state.chartData[i],
        borderColor: obj.color,
        backgroundColor: obj.color+'15',
        tension:0.35,fill:false,
        pointRadius:5,pointBackgroundColor:'#fff',
        pointBorderColor:obj.color,pointBorderWidth:2,borderWidth:2,spanGaps:false
      }))
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'%'}}},
      scales:{
        y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11},color:'#aaa'},grid:{color:'rgba(0,0,0,0.04)'}},
        x:{ticks:{font:{size:11},color:'#aaa',autoSkip:false},grid:{display:false}}
      }
    }
  });
}
function updateChart() {
  if(!chart) return;
  state.objectives.forEach((_,i)=>{ chart.data.datasets[i].data = state.chartData[i]; });
  chart.update();
}

// ── NAMES ──
function openEditNames() { document.getElementById('nameModal').classList.add('visible'); }
function closeEditNames() { document.getElementById('nameModal').classList.remove('visible'); }
function saveNames() {
  state.mentorName = document.getElementById('edit-mentor').value.trim() || state.mentorName;
  state.menteeName = document.getElementById('edit-mentee').value.trim() || state.menteeName;
  // Update display
  const chips = document.querySelectorAll('.name-chip');
  chips[0].innerHTML = `<span class="role">Mentor</span> ${state.mentorName}`;
  chips[1].innerHTML = `<span class="role" style="background:#EEF2FC;color:#2D4F9A">Mentee</span> ${state.menteeName}`;
  // Update resp select
  const sel = document.getElementById('tf-resp');
  if(sel) { sel.options[0].text = state.menteeName.split(' ')[0]+' (Mentee)'; sel.options[1].text = state.mentorName.split(' ')[0]+' (Mentor)'; }
  renderTasks();
  closeEditNames();
}

// ── RENDER ALL ──
function renderAll() {
  renderDashCards();
  renderPendingBanner();
  renderSessions();
  renderTasks();
  renderObjDetail();
  renderResources();
}

// ── INIT ──
renderAll();
initChart();

// Open S2 by default
setTimeout(()=>{ const s2 = document.getElementById('srow-1'); if(s2) s2.classList.add('open'); }, 100);
</script>
</body>
</html>
